name: Link Check

on:
  schedule:
    # Every Monday at 09:00 JST (00:00 UTC Monday)
    - cron: "0 0 * * 1"
  workflow_dispatch:

# Note: No push trigger to avoid running on every content commit.
# Use workflow_dispatch for ad-hoc manual checks.

concurrency:
  group: link-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lychee:
    name: Check links with lychee
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24.17.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Restore lychee cache
        id: lychee-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v5
        with:
          path: .lycheecache
          key: lychee-${{ github.run_id }}
          restore-keys: lychee-

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2
        continue-on-error: true
        with:
          # Accept broader status codes as a safety net for paywalled news
          # outlets and government sites that may rate-limit bots.
          #
          # Exclude kknews.co.jp (教育家庭新聞): it blocks GitHub Actions datacenter
          # IPs and times out entirely from CI, while serving HTTP 200 to normal
          # clients (verified 168/168 cited URLs live on 2026-06-09). Excluding it
          # stops recurring false-positive issues (#105, #204, #256). Re-evaluate if
          # the domain stops blocking cloud IP ranges. See ADR 0055.
          #
          # Exclude MEXT part-time staff recruitment notices
          # (b_menu/saiyou/hijyoukin/): these are time-limited postings that MEXT
          # removes once the application deadline passes, producing permanent 404s
          # by design. The source article keeps the original URL as an accurate
          # historical record; excluding the path stops the checker from re-flagging
          # this inherently ephemeral class (first seen #283; verified hard 404 on
          # 2026-06-16 against a control MEXT URL returning 200). See ADR 0056.
          args: >-
            --no-progress
            --cache
            --max-cache-age 1d
            --root-dir ${{ github.workspace }}/dist
            --accept 200,201,202,203,204,206,301,302,303,307,308,403,429,503
            --timeout 30
            --max-retries 2
            --exclude 'kknews\.co\.jp'
            --exclude 'mext\.go\.jp/b_menu/saiyou/hijyoukin/'
            './dist/**/*.html'
          fail: false
          format: markdown
          output: lychee-report.md

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: lychee-report-${{ github.run_id }}
          path: lychee-report.md
          retention-days: 14

      - name: Create Issue on broken links
        if: steps.lychee.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ ! -s lychee-report.md ]; then
            echo "lychee-report.md is missing or empty; skipping issue creation."
            exit 0
          fi

          # Ensure labels exist (idempotent)
          for label in automated link-check needs-human-review; do
            gh label create "$label" --force >/dev/null 2>&1 || true
          done

          # Skip if an open Issue already tracks broken links
          existing=$(gh issue list \
            --label link-check \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$existing" ]; then
            echo "Existing open link-check Issue #$existing found. Skipping creation."
            exit 0
          fi

          today=$(date -u +'%Y-%m-%d')

          {
            echo "週次の自動リンクチェックでリンク切れを検出しました。"
            echo ""
            echo "- Workflow run: $RUN_URL"
            echo "- 検出日 (UTC): $today"
            echo ""
            echo "一次情報の URL 変更・公的機関サイトのメンテナンス等、人間の判断が必要です。"
            echo "修正が完了したらこの Issue を close してください。"
            echo ""
            echo "## lychee レポート"
            echo ""
            head -c 60000 lychee-report.md
            if [ "$(wc -c < lychee-report.md)" -gt 60000 ]; then
              echo ""
              echo ""
              echo "_(レポートが長いため末尾を省略しました。全文は上記 Workflow run のアーティファクト \`lychee-report-*\` を参照してください)_"
            fi
          } > issue-body.md

          gh issue create \
            --title "[auto] Broken links detected ($today)" \
            --body-file issue-body.md \
            --label "automated,link-check,needs-human-review"
