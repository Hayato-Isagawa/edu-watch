name: Health prod

on:
  schedule:
    # 毎時 0 分。本番 HTTP ステータス監視(ADR 0038)。
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: health-prod-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  prod-status:
    name: Probe production endpoints for 5xx
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      check_status: ${{ steps.probe.outcome }}
      check_log: ${{ steps.probe.outputs.log }}
    env:
      BASE_URL: https://news.edu-evidence.org
      # ルート構造の異なる 5 経路で 5xx を検出(ADR 0038)。
      PATHS: "/ /about/ /categories/research/ /sources/ /digest/"
    steps:
      - id: probe
        name: Probe URLs and fail on 5xx
        run: |
          set -o pipefail
          failed=0
          {
            echo "Probe target: ${BASE_URL}"
            echo
            for path in $PATHS; do
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${BASE_URL}${path}" || echo "000")
              echo "${code} ${path}"
              # 5xx のみを fail 判定。2xx/3xx/4xx/000(network error) はログのみ。
              if [ "$code" -ge 500 ] 2>/dev/null; then
                failed=1
              fi
            done
          } | tee /tmp/probe.log
          {
            echo "log<<EOF"
            cat /tmp/probe.log
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ "$failed" -eq 1 ]; then
            echo "::error::5xx detected on production"
            exit 1
          fi

  open-issue-on-cron:
    name: Open issue on schedule failure
    needs: prod-status
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6
      - name: Ensure label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create health-prod \
            --description "本番 HTTP ステータス監視検知の Issue(ADR 0038)" \
            --color d73a4a \
            --force 2>/dev/null || true
      - name: Open or update issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          CHECK_LOG: ${{ needs.prod-status.outputs.check_log }}
        run: |
          existing=$(gh issue list \
            --label health-prod \
            --state open \
            --search 'in:title "production 5xx detected"' \
            --json number --jq '.[0].number' || true)

          body=$(cat <<EOF2
          本番 HTTP ステータス監視(ADR 0038)で 5xx を検出しました。

          ## 確認手順

          1. ローカルで対象 URL を curl して再現を確認
          2. Cloudflare Pages dashboard で最新デプロイの Functions / Workers ログを確認
          3. \`_routes.json\` / \`functions/\` / \`_middleware.ts\` の変更が直近にないか確認
          4. 必要なら roll-back または fix PR を作成

          ## ワークフロー実行

          [Run #${{ github.run_id }}](${RUN_URL})

          ## 検出ログ

          \`\`\`
          ${CHECK_LOG}
          \`\`\`
          EOF2
          )

          if [ -n "$existing" ]; then
            echo "[health-prod] existing issue #${existing}, adding comment"
            gh issue comment "$existing" --body "$body"
          else
            echo "[health-prod] creating new issue"
            gh issue create \
              --title "health-prod: production 5xx detected" \
              --label health-prod \
              --body "$body"
          fi
