name: Fetch news

on:
  schedule:
    # JST 07:00 / 18:00 = UTC 22:00 (-1d) / 09:00(設計書 §6.1、ADR 0009)
    - cron: "0 22,9 * * *"
  workflow_dispatch:

# 同時実行を抑止(cron と workflow_dispatch が重なっても 1 本だけ走る)
concurrency:
  group: fetch-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # ボット用 feature ブランチへの push に必要
      pull-requests: write  # PR 作成 + auto-merge enable に必要
      issues: write         # `gh label create` は labels API(issues スコープ)を使う
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: true
      - uses: actions/setup-node@v6
        with:
          node-version: "24.15.0"
          cache: npm
      - run: npm ci
      - name: Run fetch-news
        run: npx tsx scripts/fetch-news.ts
      - name: Commit, push branch, and open auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "edu-watch-bot"
          git config user.email "notify@edu-evidence.org"
          git add src/data/articles/
          if git diff --cached --quiet; then
            echo "[fetch-news] no new articles, skipping PR"
            exit 0
          fi
          timestamp=$(date -u +%Y%m%d-%H%M)
          branch="chore/auto-collect-${timestamp}"
          git checkout -b "$branch"
          git commit -m "chore(data): auto-collect articles ${timestamp}"
          git push -u origin "$branch"
          # `auto-collect` ラベルが未作成のリポジトリでも壊れないよう冪等に作る。
          # 既存なら --force で上書き(色 / 説明が違っても揃える)、それでも失敗
          # した場合は無視して PR 作成側で続行する(--label 指定が無効になるが
          # ボット PR 自体は作りたい)。
          gh label create auto-collect \
            --description "Bot による自動収集 PR" \
            --color ededed \
            --force 2>/dev/null || true
          file_count=$(git diff --name-only HEAD~1 | wc -l | tr -d ' ')
          gh pr create \
            --title "chore(data): auto-collect articles ${timestamp}" \
            --body "edu-watch-bot による定時自動収集。Sources: 7 RSS feeds. Files touched: ${file_count}." \
            --label "auto-collect" \
            --base main --head "$branch"
          gh pr merge --auto --squash --delete-branch "$branch"
