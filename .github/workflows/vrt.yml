name: VRT

on:
  pull_request:
    branches: [main]
    paths:
      - "src/layouts/**"
      - "src/components/**"
      - "src/styles/**"
      - "astro.config.*"
      - "vrt/**"
      - "playwright.vrt.config.ts"
      - ".github/workflows/vrt.yml"
  workflow_dispatch:

concurrency:
  group: vrt-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vrt:
    name: Visual Regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Build PR branch
        run: npm run build

      - name: Stash PR build
        run: mv dist dist-pr

      - name: Build main (baseline)
        run: |
          git worktree add /tmp/edu-watch-main origin/main
          npm --prefix /tmp/edu-watch-main ci
          npm --prefix /tmp/edu-watch-main run build
          mv /tmp/edu-watch-main/dist dist-main

      - name: Capture baseline from main
        env:
          VRT_DIST: dist-main
        run: npx playwright test --config playwright.vrt.config.ts --update-snapshots

      - name: Compare PR against baseline
        env:
          VRT_DIST: dist-pr
        run: npx playwright test --config playwright.vrt.config.ts

      - name: Upload VRT report
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vrt-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
